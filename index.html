<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="scoreboard">
      <div class="team">
        <h2>HOME</h2>
        <p class="score" id="score1">0</p>
        <div class="foul-container">
          <h6 class="foul">FOUL</h6>
          <p class="foulscore" id="foul1">0</p>
          <button class="foul-btn" onclick="Fadd1()">+1</button>
          <button class="foul-btn" onclick="Fres1()">0</button>
        </div>
        <button class="score-btn" onclick="plus1()">+1</button>
        <button class="score-btn" onclick="plus2()">+2</button>
        <button class="score-btn" onclick="plus3()">+3</button>
        <button class="score-btn" onclick="res1()">0</button>
      </div>
      <div>
        <!-- <p class="timer" id="time">00:00</p> -->
        <div id="clock">12:00</div>
        <p class="quarter" id="qrt">0</p>
        <button class="score-btn" onclick="startClock()">Start</button>
        <button class="score-btn" onclick="pauseClock()">Pause</button>
        <button class="score-btn" onclick="resetClock()">Reset</button>
        <button class="score-btn" onclick="qrt1()">QTR</button>
        <hr />

        <button class="score-btn" onclick="addMinute()">+1 Min</button>
        <button class="score-btn" onclick="subMinute()">-1 Min</button>

        <button class="score-btn" onclick="addSecond()">+5 Sec</button>
        <button class="score-btn" onclick="subSecond()">-5 Sec</button>
        <div class="play-container"></div>
      </div>

      <div class="team">
        <h2>ALIENS</h2>
        <p class="score" id="score2">0</p>
        <div class="foul-container">
          <h6 class="foul">FOUL</h6>
          <p class="foulscore" id="foul2">0</p>
          <button class="foul-btn" onclick="Fadd2()">+1</button>
          <button class="foul-btn" onclick="Fres2()">0</button>
        </div>
        <button class="score-btn" onclick="plus4()">+1</button>
        <button class="score-btn" onclick="plus5()">+2</button>
        <button class="score-btn" onclick="plus6()">+3</button>
        <button class="score-btn" onclick="res2()">0</button>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
